<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥜 イユ占い</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --peanut: #D4A84B;
    --peanut-dark: #8B6220;
    --peanut-light: #F5DFA0;
    --shell: #E8C06A;
    --bg: #1A1208;
    --bg2: #241A0C;
    --bg3: #2E2010;
    --text: #F5E8C8;
    --text-muted: #A89060;
    --love: #E06B8A;
    --work: #5BA85A;
    --money: #6B9DE8;
    --health: #B07FE0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kurenaido', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(245,223,160,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(245,223,160,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 10%, rgba(245,223,160,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 25%, rgba(245,223,160,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 60%, rgba(245,223,160,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 20% 75%, rgba(245,223,160,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 80%, rgba(245,223,160,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 90%, rgba(245,223,160,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 45% 55%, rgba(245,223,160,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(245,223,160,0.6) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Kaisei Tokumin', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--peanut);
    letter-spacing: 0.1em;
    line-height: 1;
    text-shadow: 0 0 40px rgba(212,168,75,0.4);
  }

  .header .subtitle {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 6px;
    letter-spacing: 0.15em;
  }

  /* Date */
  .date-display {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 32px;
    margin-top: 4px;
  }

  /* Peanut SVG area */
  .peanut-area {
    width: 160px;
    height: 160px;
    margin-bottom: 32px;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .peanut-svg {
    width: 140px;
    height: 140px;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 20px rgba(212,168,75,0.35));
  }

  .peanut-area:hover .peanut-svg {
    transform: scale(1.08) rotate(-3deg);
    filter: drop-shadow(0 0 30px rgba(212,168,75,0.6));
  }

  .peanut-area.shaking .peanut-svg {
    animation: shake 0.5s ease;
  }

  .peanut-area.cracking .peanut-svg {
    animation: crack 0.6s ease forwards;
  }

  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    15% { transform: rotate(-10deg) scale(1.05); }
    30% { transform: rotate(10deg) scale(1.1); }
    45% { transform: rotate(-8deg) scale(1.08); }
    60% { transform: rotate(8deg) scale(1.1); }
    75% { transform: rotate(-5deg) scale(1.05); }
    90% { transform: rotate(5deg); }
  }

  @keyframes crack {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    60% { transform: scale(1.1) rotate(5deg); }
    100% { transform: scale(0.95) rotate(0deg); }
  }

  .tap-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 36px;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Fortune card */
  .fortune-card {
    width: 100%;
    background: var(--bg2);
    border: 1px solid rgba(212,168,75,0.2);
    border-radius: 20px;
    padding: 28px 24px;
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.6s ease;
  }

  .fortune-card.visible {
    display: flex;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fortune-title {
    font-family: 'Kaisei Tokumin', serif;
    font-size: 1rem;
    color: var(--peanut);
    letter-spacing: 0.15em;
    text-align: center;
  }

  /* Overall rank */
  .rank-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .rank-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .rank-value {
    font-family: 'Kaisei Tokumin', serif;
    font-size: 2rem;
    color: var(--peanut);
    font-weight: 700;
  }

  .stars-row {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: -8px;
  }

  .star {
    font-size: 1.1rem;
    color: var(--peanut);
    opacity: 0.3;
    transition: opacity 0.3s;
  }
  .star.on { opacity: 1; }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(212,168,75,0.15);
  }

  /* Meters */
  .meters {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .meter-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .meter-name {
    font-size: 0.78rem;
    color: var(--text-muted);
    width: 52px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
    text-align: right;
  }

  .meter-bar-bg {
    flex: 1;
    height: 7px;
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
  }

  .meter-bar-fill {
    height: 100%;
    border-radius: 4px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .meter-stars {
    font-size: 0.72rem;
    width: 60px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* Message */
  .fortune-message {
    background: var(--bg3);
    border-left: 2px solid var(--peanut);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-size: 0.9rem;
    line-height: 1.85;
    color: var(--text);
    letter-spacing: 0.03em;
  }

  /* Lucky */
  .lucky-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
    gap: 8px;
  }

  .lucky-item {
    flex: 1;
    background: var(--bg3);
    border-radius: 12px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .lucky-label {
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .lucky-value {
    font-size: 0.88rem;
    color: var(--peanut-light);
    font-family: 'Kaisei Tokumin', serif;
  }

  /* Retry button */
  .retry-btn {
    display: none;
    margin: 0 auto;
    margin-top: 20px;
    background: none;
    border: 1px solid rgba(212,168,75,0.4);
    color: var(--text-muted);
    padding: 10px 28px;
    border-radius: 50px;
    font-family: 'Zen Kurenaido', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retry-btn.visible { display: block; }

  .retry-btn:hover {
    border-color: var(--peanut);
    color: var(--peanut);
    background: rgba(212,168,75,0.05);
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    font-size: 0.7rem;
    color: var(--text-muted);
    opacity: 0.5;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🥜 イユ占い</h1>
    <div class="subtitle">ピーナッツが運命を告げる</div>
  </div>

  <div class="date-display" id="dateDisplay"></div>

  <div class="peanut-area" id="peanutArea" onclick="revealFortune()">
    <svg class="peanut-svg" id="peanutSvg" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <!-- Shell -->
      <ellipse cx="70" cy="70" rx="52" ry="38" fill="#C89940" opacity="0.3"/>
      <ellipse cx="70" cy="70" rx="48" ry="34" fill="#D4A84B"/>
      <ellipse cx="70" cy="70" rx="40" ry="26" fill="#E8C06A"/>
      <!-- Ridges -->
      <path d="M40 58 Q70 46 100 58" fill="none" stroke="#C89940" stroke-width="1.5" opacity="0.7"/>
      <path d="M36 70 Q70 56 104 70" fill="none" stroke="#C89940" stroke-width="1.5" opacity="0.7"/>
      <path d="M40 82 Q70 94 100 82" fill="none" stroke="#C89940" stroke-width="1.5" opacity="0.7"/>
      <!-- Center pinch -->
      <ellipse cx="70" cy="70" rx="5" ry="34" fill="#B8892A" opacity="0.4"/>
      <!-- Crack line (hidden initially) -->
      <path id="crackLine" d="M70 36 Q73 55 70 70 Q67 85 70 104" fill="none" stroke="#8B6220" stroke-width="2.5" opacity="0" stroke-dasharray="8,3"/>
      <!-- Shine -->
      <ellipse cx="58" cy="58" rx="8" ry="5" fill="white" opacity="0.12" transform="rotate(-20 58 58)"/>
    </svg>
  </div>

  <div class="tap-hint" id="tapHint">🥜 タップして占う</div>

  <div class="fortune-card" id="fortuneCard">
    <div class="fortune-title">今日の運勢</div>

    <div>
      <div class="rank-row">
        <span class="rank-label">総合運</span>
        <span class="rank-value" id="overallRank"></span>
      </div>
      <div class="stars-row" id="overallStars"></div>
    </div>

    <div class="divider"></div>

    <div class="meters" id="meters"></div>

    <div class="divider"></div>

    <div class="fortune-message" id="fortuneMessage"></div>

    <div class="lucky-row" id="luckyRow"></div>
  </div>

  <button class="retry-btn" id="retryBtn" onclick="resetFortune()">もう一度占う</button>

  <div class="footer">毎日0時にリセット ✦ イユ占い</div>
</div>

<script>
const FORTUNES = [
  {
    overall: 4,
    meters: { 恋愛運: [3,'#E06B8A'], 仕事運: [5,'#5BA85A'], 金運: [3,'#6B9DE8'], 健康運: [4,'#B07FE0'] },
    message: "今日は仕事運が満開です🌟 アイデアが次々と湧き出てくる一日。思い切って行動に移してみて。周りもあなたの頑張りをちゃんと見ているよ。恋愛はあせらず自然体でいるのが吉。黄色いものが幸運を呼びます🥜",
    lucky: { 色: '黄色', 数字: '7', アイテム: 'ピーナッツ' }
  },
  {
    overall: 5,
    meters: { 恋愛運: [5,'#E06B8A'], 仕事運: [4,'#5BA85A'], 金運: [4,'#6B9DE8'], 健康運: [5,'#B07FE0'] },
    message: "大吉の予感！✨ 今日はすべてがうまく回る一日。特に人との縁が深まりそう。思い切って気になる人に話しかけてみて。お金も動くかも。体調もよく、何をやっても充実感があるはず🥜",
    lucky: { 色: 'ゴールド', 数字: '3', アイテム: 'ナッツ菓子' }
  },
  {
    overall: 3,
    meters: { 恋愛運: [4,'#E06B8A'], 仕事運: [2,'#5BA85A'], 金運: [5,'#6B9DE8'], 健康運: [3,'#B07FE0'] },
    message: "金運が好調🌈 思わぬ臨時収入があるかも。仕事は今日は無理せず、じっくりコツコツが正解。恋愛は積極的に動くと吉。夜は早めに休んで体を整えて🥜",
    lucky: { 色: '茶色', 数字: '5', アイテム: 'コーヒー' }
  },
  {
    overall: 2,
    meters: { 恋愛運: [2,'#E06B8A'], 仕事運: [3,'#5BA85A'], 金運: [2,'#6B9DE8'], 健康運: [4,'#B07FE0'] },
    message: "今日はのんびりデーかも🌙 無理に動かず、自分をいたわる時間にするのが吉。焦りは禁物。ゆっくりお茶でも飲みながら、次の一手を考えよう。健康は安定しているので安心して🥜",
    lucky: { 色: '白', 数字: '1', アイテム: '温かいお茶' }
  },
  {
    overall: 4,
    meters: { 恋愛運: [4,'#E06B8A'], 仕事運: [3,'#5BA85A'], 金運: [5,'#6B9DE8'], 健康運: [4,'#B07FE0'] },
    message: "金運と恋愛運が好調🌟 今日は思い切って買い物や告白をするのも良いかも。仕事は無理せず着実に。健康面は問題なし。夜の出会いに注目！🥜",
    lucky: { 色: 'オレンジ', 数字: '8', アイテム: 'ピーナッツバター' }
  },
];

function getDateString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = d.getMonth()+1;
  const day = d.getDate();
  const wdays = ['日','月','火','水','木','金','土'];
  const w = wdays[d.getDay()];
  return `${y}年${m}月${day}日（${w}）`;
}

function getTodayFortune() {
  const d = new Date();
  const seed = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  return FORTUNES[seed % FORTUNES.length];
}

function renderStars(n, max=5) {
  let s = '';
  for(let i=1;i<=max;i++) s += `<span class="star${i<=n?' on':''}" style="${i<=n?'':''}">★</span>`;
  return s;
}

function renderMeters(meters) {
  let html = '';
  for(const [name,[score,color]] of Object.entries(meters)) {
    const stars = '★'.repeat(score) + '☆'.repeat(5-score);
    html += `
      <div class="meter-row">
        <span class="meter-name">${name}</span>
        <div class="meter-bar-bg">
          <div class="meter-bar-fill" data-width="${score*20}" style="background:${color}"></div>
        </div>
        <span class="meter-stars" style="color:${color}">${stars}</span>
      </div>`;
  }
  return html;
}

function renderLucky(lucky) {
  let html = '';
  for(const [k,v] of Object.entries(lucky)) {
    html += `<div class="lucky-item"><span class="lucky-label">${k}</span><span class="lucky-value">${v}</span></div>`;
  }
  return html;
}

let revealed = false;

function revealFortune() {
  if(revealed) return;
  revealed = true;

  const area = document.getElementById('peanutArea');
  const hint = document.getElementById('tapHint');
  const crack = document.getElementById('crackLine');

  area.classList.add('shaking');
  hint.textContent = '🥜 殻を割っています…';

  setTimeout(() => {
    area.classList.remove('shaking');
    area.classList.add('cracking');
    crack.style.opacity = '1';
  }, 550);

  setTimeout(() => {
    const f = getTodayFortune();

    document.getElementById('overallRank').textContent = '★'.repeat(f.overall) + '☆'.repeat(5-f.overall);
    document.getElementById('overallStars').innerHTML = renderStars(f.overall);
    document.getElementById('meters').innerHTML = renderMeters(f.meters);
    document.getElementById('fortuneMessage').textContent = f.message;
    document.getElementById('luckyRow').innerHTML = renderLucky(f.lucky);

    const card = document.getElementById('fortuneCard');
    card.classList.add('visible');

    hint.textContent = '';

    // Animate bars
    setTimeout(() => {
      document.querySelectorAll('.meter-bar-fill').forEach(el => {
        el.style.width = el.dataset.width + '%';
      });
    }, 100);

    document.getElementById('retryBtn').classList.add('visible');
  }, 1100);
}

function resetFortune() {
  revealed = false;
  const area = document.getElementById('peanutArea');
  area.classList.remove('shaking','cracking');
  document.getElementById('crackLine').style.opacity = '0';
  document.getElementById('fortuneCard').classList.remove('visible');
  document.getElementById('retryBtn').classList.remove('visible');
  document.getElementById('tapHint').textContent = '🥜 タップして占う';
  document.querySelectorAll('.meter-bar-fill').forEach(el => el.style.width='0%');
}

document.getElementById('dateDisplay').textContent = getDateString();
</script>
</body>
</html>
